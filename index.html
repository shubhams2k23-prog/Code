<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background: #e0f7fa; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.card { background:white; padding:2.5rem 1.5rem; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.1); text-align:center; width:90%; max-width:400px; position:relative; }
.card h2 { font-weight:600; margin-bottom:1rem; color:#00796b; }
.card p { font-size:1.1rem; margin-bottom:2rem; color:#004d40; }
.buttons { display:flex; justify-content:center; gap:100px; position:relative; height:50px; }
button { padding:0.8rem 1.5rem; font-size:1rem; border:none; border-radius:12px; cursor:pointer; transition:all 0.2s ease; }
button:active { transform:scale(0.95); }
.yes { background:#ff5252; color:white; position:absolute; box-shadow:0 8px 20px rgba(0,0,0,0.15); }
.no { background:#448aff; color:white; box-shadow:0 6px 15px rgba(0,0,0,0.1); }
#message { margin-top:1.5rem; font-weight:600; color:#00796b; }
.emoji { position:absolute; font-size:1.5rem; pointer-events:none; animation:floatUp 1s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-50px);} }
@media(max-width:400px){ .card p{ font-size:1rem; } button{ padding:0.6rem 1.2rem; font-size:0.9rem; } .buttons{ gap:60px; } }
</style>
</head>
<body>
<div class="card" id="card">
<h2>Hey 👋</h2>
<p><b>I can live without you</b> 😌</p>
<div class="buttons">
  <button class="yes" id="yesBtn">😄 YES</button>
  <button class="no" id="noBtn" onclick="noClick()">🙃 NO</button>
</div>
<div id="message"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const card = document.getElementById("card");
let speed = 1;

// Get NO button position relative to card
function getNoPosition(){
  const rect = noBtn.getBoundingClientRect();
  const cardRect = card.getBoundingClientRect();
  return {
    left: rect.left - cardRect.left,
    top: rect.top - cardRect.top,
    width: rect.width,
    height: rect.height
  };
}

// Place YES initially away from NO
function placeYesInitial(){
  const cardRect = card.getBoundingClientRect();
  const yesRect = yesBtn.getBoundingClientRect();
  const noPos = getNoPosition();
  let x,y,safe=false;
  while(!safe){
    x = Math.random() * (cardRect.width - yesRect.width);
    y = Math.random() * (cardRect.height - yesRect.height - 50); // leave space at bottom
    const overlapX = x + yesRect.width > noPos.left && x < noPos.left + noPos.width;
    const overlapY = y + yesRect.height > noPos.top && y < noPos.top + noPos.height;
    if(! (overlapX && overlapY)) safe=true;
  }
  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";
}

// Move YES button dynamically
function moveButton(){
  const cardRect = card.getBoundingClientRect();
  const yesRect = yesBtn.getBoundingClientRect();
  const noPos = getNoPosition();
  let x,y,safe=false;
  while(!safe){
    x = Math.random() * (cardRect.width - yesRect.width);
    y = Math.random() * (cardRect.height - yesRect.height - 50);
    const overlapX = x + yesRect.width > noPos.left && x < noPos.left + noPos.width;
    const overlapY = y + yesRect.height > noPos.top && y < noPos.top + noPos.height;
    if(! (overlapX && overlapY)) safe=true;
  }
  yesBtn.style.transition = `left ${0.3/speed}s ease, top ${0.3/speed}s ease`;
  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";
  speed += 0.1;
  card.style.background = "#fff3e0";
  setTimeout(()=>{ card.style.background = "white"; }, 100);
}

// Event listeners
yesBtn.addEventListener("mouseover", moveButton);
yesBtn.addEventListener("touchstart", e=>{ e.preventDefault(); moveButton(); });
yesBtn.addEventListener("click", e=>{ e.preventDefault(); moveButton(); });

// NO button
function noClick(){
  showEmoji("💖");
  document.getElementById("message").innerText = "I knew you'd say that 😌";
}

// floating emoji
function showEmoji(emoji){
  const span = document.createElement("span");
  span.className="emoji";
  span.innerText=emoji;
  const noPos = getNoPosition();
  span.style.left = (noPos.left + noPos.width/2 - 8) + "px";
  span.style.top = (noPos.top - 10) + "px";
  card.appendChild(span);
  setTimeout(()=>{ span.remove(); },1000);
}

// INITIAL placement
placeYesInitial();
</script>
</body>
</html>
