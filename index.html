<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
overflow:hidden;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
width:90%;
max-width:350px;
position:relative;
}

.buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.yes{
background:#ff7675;
color:white;
position:absolute;
}

.no{
background:#74b9ff;
color:white;
}

#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card" id="card">

<h2>Hey 👋</h2>

<p><b>I can live without you</b> 😌</p>

<div class="buttons">
<button class="yes" id="yesBtn">😄 Yes</button>
<button class="no" id="noBtn" onclick="noClick()">🙃 No</button>
</div>

<div id="message"></div>

</div>

<script>

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const card=document.getElementById("card");

function moveButton(){

const cardRect=card.getBoundingClientRect();
const yesRect=yesBtn.getBoundingClientRect();
const noRect=noBtn.getBoundingClientRect();

const maxX=cardRect.width-yesRect.width-10;
const maxY=cardRect.height-yesRect.height-10;

let x,y,safe=false;

while(!safe){

x=Math.random()*maxX;
y=Math.random()*maxY;

const overlapX = x + yesRect.width > noRect.left - cardRect.left &&
                 x < noRect.right - cardRect.left;

const overlapY = y + yesRect.height > noRect.top - cardRect.top &&
                 y < noRect.bottom - cardRect.top;

if(!(overlapX && overlapY)){
safe=true;
}

}

yesBtn.style.left=x+"px";
yesBtn.style.top=y+"px";

}

// desktop
yesBtn.addEventListener("mouseover",moveButton);

// phone
yesBtn.addEventListener("touchstart",function(e){
e.preventDefault();
moveButton();
});

// backup prevention
yesBtn.addEventListener("click",function(e){
e.preventDefault();
moveButton();
});

function noClick(){
document.getElementById("message").innerHTML=
"I knew you'd say that 😌";
}

</script>

</body>
</html>
