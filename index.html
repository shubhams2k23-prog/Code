<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
/* Global */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #e0f7fa, #80deea);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Card */
.card {
  background: white;
  padding: 2.5rem 1.5rem;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  text-align: center;
  width: 90%;
  max-width: 400px;
  position: relative;
  transition: background 0.3s;
}

.card h2 {
  font-weight: 600;
  margin-bottom: 1rem;
  color: #00796b;
}

.card p {
  font-size: 1.1rem;
  margin-bottom: 2rem;
  color: #004d40;
}

/* Buttons */
button {
  padding: 0.8rem 1.5rem;
  font-size: 1rem;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:active {
  transform: scale(0.95);
}

.yes {
  background: #ff5252;
  color: white;
  position: absolute;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.no {
  background: #448aff;
  color: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  position: relative;
  margin-left: 10px;
}

#message {
  margin-top: 1.5rem;
  font-weight: 600;
  color: #00796b;
}

/* Responsive */
@media (max-width: 400px){
  .card p {
    font-size: 1rem;
  }
  button {
    padding: 0.6rem 1.2rem;
    font-size: 0.9rem;
  }
}
</style>
</head>
<body>

<div class="card" id="card">
  <h2>Hey 👋</h2>
  <p><b>I can live without you</b> 😌</p>

  <div class="buttons">
    <button class="yes" id="yesBtn">😄 Yes</button>
    <button class="no" id="noBtn" onclick="noClick()">🙃 No</button>
  </div>

  <div id="message"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const card = document.getElementById("card");

function moveButton(){
  const cardRect = card.getBoundingClientRect();
  const yesRect = yesBtn.getBoundingClientRect();
  const noRect = noBtn.getBoundingClientRect();

  const maxX = cardRect.width - yesRect.width - 10;
  const maxY = cardRect.height - yesRect.height - 10;

  let x, y, safe=false;

  while(!safe){
    x = Math.random() * maxX;
    y = Math.random() * maxY;

    const overlapX = x + yesRect.width > noRect.left - cardRect.left &&
                     x < noRect.right - cardRect.left;
    const overlapY = y + yesRect.height > noRect.top - cardRect.top &&
                     y < noRect.bottom - cardRect.top;

    if(!(overlapX && overlapY)) safe=true;
  }

  // Smooth animation
  yesBtn.style.transition = 'left 0.3s ease, top 0.3s ease';
  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";
}

// Move YES button on desktop hover
yesBtn.addEventListener("mouseover", moveButton);

// Mobile touch
yesBtn.addEventListener("touchstart", function(e){
  e.preventDefault();
  moveButton();
});

// Prevent tap on mobile
yesBtn.addEventListener("click", function(e){
  e.preventDefault();
  moveButton();
});

// NO button click
function noClick(){
  document.getElementById("message").innerHTML = "I knew you'd say that 😌";
}
</script>

</body>
</html>
